name: Daily Investment Briefing

on:
  schedule:
    - cron: '0 10 * * 1-5'  # disparo 7h BRT (10h UTC) — absorve ~2-3h de fila do GitHub Actions para entrega ~10h BRT
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gerar briefing
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          WHATSAPP_NUMBER:  ${{ secrets.WHATSAPP_NUMBER }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
        run: python scripts/generate_briefing.py

      - name: Commit e push
        run: |
          git config user.name  "CIO Daily Bot"
          git config user.email "bot@ciodaily.local"
          git add briefing.json data/history.json
          git diff --staged --quiet || git commit -m "briefing: $(date +'%d/%m/%Y') [v2.0-quant]"
          git push
